<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x-form 用户端</title>
  <style>
    body{margin:0;background:#f8fafc;font-family:Inter,Arial,sans-serif;color:#0f172a}
    .wrap{max-width:760px;margin:40px auto;padding:0 16px}
    .panel{background:#fff;border-radius:18px;padding:24px;box-shadow:0 6px 24px rgba(15,23,42,.06)}
    h1{margin-top:0}
    label{display:block;margin:12px 0 6px;font-weight:600}
    input,textarea,button{font:inherit}
    input,textarea{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;box-sizing:border-box}
    button{margin-top:18px;background:#2563eb;color:#fff;border:none;padding:12px 18px;border-radius:10px;cursor:pointer}
    .desc{color:#64748b}
    #message{min-height:20px}
    .empty{padding:16px;border:1px dashed #cbd5e1;border-radius:12px;background:#f8fafc;color:#64748b}
  </style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1 id="title">欢迎使用 x-form</h1>
    <p class="desc" id="description">请通过分享链接进入具体表单页面。</p>
    <p id="message"></p>
    <p class="desc" id="apiBaseTip"></p>
    <div id="emptyState" class="empty" style="display:none">当前缺少 formId 参数，请从管理端分享链接进入，例如：<code>/user/?formId=1</code></div>
    <form id="form"></form>
  </div>
</div>
<script src="../common-api.js"></script>
<script src="user.js"></script>
</body>
</html>
